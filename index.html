<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>С 8 марта, мама! ✨</title>
  <style>
    /* ===== СБРОС И БАЗОВЫЕ НАСТРОЙКИ ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: none; /* скрываем стандартный курсор */
    }

    body {
      background: linear-gradient(145deg, #fce4e8 0%, #ffe9f0 40%, #fff3f5 100%);
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== ПЕРЕЛИВАЮЩИЙСЯ КУРСОР-КРУЖОЧЕК ===== */
    .cursor-glow {
      position: fixed;
      width: 32px;
      height: 32px;
      background: radial-gradient(circle at 30% 30%, rgba(255, 230, 240, 0.95), rgba(255, 200, 220, 0.6));
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: soft-light;
      backdrop-filter: blur(1px);
      box-shadow: 0 0 20px 8px #ffb6c1, 0 0 40px 15px #ff9eb5;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, background 0.3s;
      animation: cursorGlow 2.2s infinite alternate ease-in-out;
    }

    @keyframes cursorGlow {
      0% {
        box-shadow: 0 0 15px 5px #ffa5c3, 0 0 30px 12px #ff8aa7;
        background: radial-gradient(circle at 30% 30%, #ffe4ed, #ffb3c6);
      }
      50% {
        box-shadow: 0 0 25px 12px #ffb8d0, 0 0 50px 20px #ff98b9;
        background: radial-gradient(circle at 30% 30%, #ffeef2, #ffc1d0);
      }
      100% {
        box-shadow: 0 0 20px 10px #ffcad4, 0 0 45px 18px #ffb0c3;
        background: radial-gradient(circle at 30% 30%, #fff0f5, #ffb7c5);
      }
    }

    /* ===== ПАРАЛЛАКС-СЛОЙ (ЦВЕТЫ И СЕРДЕЧКИ) ===== */
    .parallax-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .parallax-item {
      position: absolute;
      font-size: 2.8rem;
      opacity: 0.25;
      filter: drop-shadow(0 4px 6px rgba(255, 100, 150, 0.2));
      animation: floatItem 14s infinite alternate ease-in-out;
      transition: transform 0.1s ease-out; /* smooth parallax shift */
      will-change: transform;
    }

    @keyframes floatItem {
      0% { transform: translateY(0px) rotate(0deg); }
      100% { transform: translateY(-20px) rotate(6deg); }
    }

    /* разные размеры и задержки */
    .parallax-item:nth-child(1) { top: 12%; left: 5%; font-size: 3.5rem; animation-duration: 16s; }
    .parallax-item:nth-child(2) { bottom: 18%; right: 3%; font-size: 5rem; animation-duration: 19s; }
    .parallax-item:nth-child(3) { top: 25%; right: 15%; font-size: 2.8rem; animation-duration: 13s; }
    .parallax-item:nth-child(4) { bottom: 30%; left: 12%; font-size: 4.2rem; animation-duration: 18s; }
    .parallax-item:nth-child(5) { top: 60%; left: 30%; font-size: 3rem; animation-duration: 15s; }
    .parallax-item:nth-child(6) { top: 10%; left: 70%; font-size: 4rem; animation-duration: 20s; }
    .parallax-item:nth-child(7) { bottom: 5%; left: 45%; font-size: 3.8rem; animation-duration: 17s; }
    .parallax-item:nth-child(8) { top: 40%; left: 85%; font-size: 3rem; animation-duration: 14s; }

    /* ===== ОСНОВНОЙ КОНТЕНТ (ПОВЕРХ ПАРАЛЛАКСА) ===== */
    .content {
      position: relative;
      z-index: 10;
      max-width: 950px;
      width: 100%;
      text-align: center;
      background: rgba(255, 250, 245, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 60px 60px 40px 40px;
      padding: 2.5rem 2rem 3rem;
      box-shadow: 0 25px 45px -12px rgba(255, 140, 170, 0.35), 0 0 0 1.5px rgba(255, 220, 230, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #b3476b, #d45e8b, #b33b5c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      text-shadow: 0 6px 12px rgba(230, 120, 150, 0.25);
      letter-spacing: -0.5px;
      animation: titlePulse 3s infinite alternate;
    }

    @keyframes titlePulse {
      0% { transform: scale(1); filter: drop-shadow(0 4px 6px #ffb8d0); }
      100% { transform: scale(1.02); filter: drop-shadow(0 8px 18px #ff90b0); }
    }

    .sub {
      font-size: 1.7rem;
      color: #a53f62;
      background: rgba(255, 240, 245, 0.7);
      display: inline-block;
      padding: 0.5rem 2rem;
      border-radius: 60px;
      backdrop-filter: blur(2px);
      margin-bottom: 2.2rem;
      font-weight: 350;
      border: 1.5px dashed #ffb3c6;
      box-shadow: 0 10px 15px -10px #fbaac3;
    }

    /* карточки */
    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      margin: 2.8rem 0 3rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      padding: 2rem 2rem 2rem 2rem;
      border-radius: 48px;
      width: 260px;
      box-shadow: 0 25px 35px -18px rgba(200, 100, 130, 0.5), 0 0 0 1px rgba(255, 210, 225, 1);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 1px solid rgba(255, 255, 255, 0.9);
      transform: translateY(0);
    }

    .card:hover {
      transform: translateY(-16px) scale(1.02);
      box-shadow: 0 40px 50px -18px #ff98af, 0 0 0 2.5px #ffb7c9;
      background: rgba(255, 245, 250, 0.9);
    }

    .card h3 {
      font-size: 2rem;
      font-weight: 600;
      color: #ac3f64;
      margin-bottom: 0.75rem;
      letter-spacing: -0.3px;
    }

    .card p {
      font-size: 1.2rem;
      color: #5f3d4a;
      font-weight: 400;
      line-height: 1.5;
    }

    /* сюрприз-кнопка */
    .surprise-btn {
      background: linear-gradient(125deg, #ffb1c7, #ff8daa);
      border: none;
      color: white;
      font-size: 1.7rem;
      font-weight: 600;
      padding: 1.3rem 3rem;
      border-radius: 120px;
      backdrop-filter: blur(5px);
      box-shadow: 0 25px 30px -12px #d45e87, 0 2px 0 0 #ffe4ed inset, 0 -2px 0 0 #b34762 inset;
      cursor: none;
      transition: 0.25s ease;
      letter-spacing: 1.5px;
      border: 1px solid white;
      margin-top: 1.2rem;
      position: relative;
      overflow: hidden;
    }

    .surprise-btn::after {
      content: "🎉";
      position: absolute;
      right: -20px;
      top: -20px;
      font-size: 3rem;
      opacity: 0.5;
      transform: rotate(20deg);
      transition: 0.3s;
    }

    .surprise-btn:hover {
      transform: scale(1.06);
      background: linear-gradient(125deg, #ffbcd2, #ff9ebd);
      box-shadow: 0 35px 40px -15px #ff7a9e, 0 3px 0 0 white inset;
    }

    .surprise-btn:active {
      transform: scale(0.97);
    }

    /* скрытый сюрпризный блок */
    .surprise-box {
      margin: 2.5rem auto 1rem;
      max-width: 550px;
      background: rgba(255, 240, 250, 0.9);
      backdrop-filter: blur(15px);
      border-radius: 50px;
      padding: 2rem;
      border: 2px solid #ffc1d6;
      box-shadow: 0 20px 30px 0 #ffb0c9;
      transform: scale(0.8);
      opacity: 0;
      transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }

    .surprise-box.show {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .surprise-box p {
      font-size: 1.8rem;
      color: #9f3e5c;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .surprise-box .emoji-burst {
      font-size: 3.3rem;
      filter: drop-shadow(0 6px 8px #ffb8c6);
      animation: burst 1.4s infinite alternate;
    }

    @keyframes burst {
      0% { transform: scale(1) rotate(0deg); }
      100% { transform: scale(1.2) rotate(8deg); }
    }

    /* скрытое поздравление во второй карточке (сделаем сюрприз) */
    .card-extra-content {
      display: none;
    }

    .card .hidden-message {
      display: block;
      margin-top: 0.9rem;
      font-size: 1.1rem;
      color: #c9436f;
      background: #ffeaf1;
      padding: 0.4rem 1rem;
      border-radius: 60px;
      border: 1px solid #ffb0c9;
    }

    /* адаптация */
    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
      .sub { font-size: 1.3rem; }
      .card { width: 200px; }
      .surprise-btn { font-size: 1.4rem; padding: 1rem 2rem; }
    }
  </style>
</head>
<body>

  <!-- переливающийся курсор -->
  <div class="cursor-glow" id="glowCursor"></div>

  <!-- параллакс слой (цветы, сердечки) -->
  <div class="parallax-bg" id="parallax">
    <div class="parallax-item">🌸</div>
    <div class="parallax-item">🌷</div>
    <div class="parallax-item">❤️</div>
    <div class="parallax-item">🌹</div>
    <div class="parallax-item">💐</div>
    <div class="parallax-item">🌺</div>
    <div class="parallax-item">🌼</div>
    <div class="parallax-item">🌻</div>
  </div>

  <div class="content">
    <h1>🌹 С 8 марта, любимая мама! 🌹</h1>
    <div class="sub">спасибо за всё</div>

    <div class="cards">
      <div class="card">
        <h3>🌸 мама и бабушка 🌸</h3>
        <p>💖 Здоровья, счастья, успехов! 💖</p>
        <div class="hidden-message">✨ Вы самые лучшие ✨</div>
      </div>
      <div class="card" id="card2">
        <h3>🌷 для тебя 🌷</h3>
        <p>Пусть каждый день дарит улыбки</p>
        <!-- вторая карточка тоже получит поздравление через сюрприз, но пока пусть будет мило -->
      </div>
    </div>

    <button class="surprise-btn" id="surpriseBtn">🎁 ОТКРЫТЬ СЮРПРИЗ</button>

    <!-- скрытый сюрпризный блок появится после клика -->
    <div class="surprise-box" id="surpriseBox">
      <p>🌷 С 8 Марта! 🌷</p>
      <div class="emoji-burst">
        🍫 ✨ 🥂 💐 🍬 🎀
      </div>
      <p style="font-size: 1.3rem;">Мама, ты — моё вдохновение! ❤️</p>
    </div>
  </div>

  <script>
    (function() {
      // ---- 1. переливающийся курсор (следит за мышкой) ----
      const cursor = document.getElementById('glowCursor');
      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
      });

      // дополнительно: прячем курсор при уходе с окна
      document.addEventListener('mouseleave', () => {
        cursor.style.opacity = '0';
      });
      document.addEventListener('mouseenter', () => {
        cursor.style.opacity = '1';
      });

      // ---- 2. ПАРАЛЛАКС ЭФФЕКТ ПРИ НАВЕДЕНИИ (движение мыши) ----
      const parallaxItems = document.querySelectorAll('.parallax-item');
      document.addEventListener('mousemove', (e) => {
        const mouseX = e.clientX / window.innerWidth - 0.5;  // от -0.5 до 0.5
        const mouseY = e.clientY / window.innerHeight - 0.5;

        parallaxItems.forEach((item) => {
          // разные глубины: одни двигаются сильнее, другие слабее
          const depth = parseFloat(item.getAttribute('data-depth') || 
                         (Math.random() * 0.6 + 0.2).toFixed(2)); // от 0.2 до 0.8
          if (!item.hasAttribute('data-depth')) {
            item.setAttribute('data-depth', depth);
          }
          // Сдвиг: мышь влияет на translate (чем больше depth, тем больше движение)
          const moveX = mouseX * 60 * depth;   // макс ±30px
          const moveY = mouseY * 60 * depth;
          // применяем с сохранением базовой анимации float
          item.style.transform = `translate(${moveX}px, ${moveY}px) translateY(-5px) rotate(${mouseX*5}deg)`;
        });
      });

      // ---- 3. СЮРПРИЗ ПО КНОПКЕ (и дополнительный эффект) ----
      const surpriseBtn = document.getElementById('surpriseBtn');
      const surpriseBox = document.getElementById('surpriseBox');
      const card2 = document.getElementById('card2'); // вторая карточка

      surpriseBtn.addEventListener('click', () => {
        // показать блок с сюрпризом (появление)
        surpriseBox.classList.toggle('show');

        // дополнительный сюрприз: меняем текст во второй карточке и конфетти эффект
        if (!card2.querySelector('.hidden-message')) {
          const newMsg = document.createElement('div');
          newMsg.className = 'hidden-message';
          newMsg.innerText = '✨ ты супер! ✨';
          card2.appendChild(newMsg);
        } else {
          // если уже есть, просто меняем текст
          const msgDiv = card2.querySelector('.hidden-message');
          if (msgDiv) {
            msgDiv.innerText = msgDiv.innerText.includes('супер') ? '✨ ещё больше любви ✨' : '✨ ты супер! ✨';
          }
        }

        // вспышка-переливание курсора при клике
        cursor.style.width = '60px';
        cursor.style.height = '60px';
        cursor.style.background = 'radial-gradient(circle at 30% 30%, #ffeef7, #ffb0cb)';
        setTimeout(() => {
          cursor.style.width = '32px';
          cursor.style.height = '32px';
        }, 250);

        // маленький фейерверк-радость (через консоль невидно, добавим визуал)
        const emojis = ['🌸','🌼','🌺','❤️','💖','🎉'];
        for (let i = 0; i < 6; i++) {
          let conf = document.createElement('span');
          conf.innerText = emojis[Math.floor(Math.random() * emojis.length)];
          conf.style.position = 'fixed';
          conf.style.left = Math.random() * window.innerWidth + 'px';
          conf.style.top = Math.random() * window.innerHeight + 'px';
          conf.style.fontSize = (Math.random() * 30 + 20) + 'px';
          conf.style.pointerEvents = 'none';
          conf.style.zIndex = '99999';
          conf.style.opacity = '0.9';
          conf.style.transition = 'all 1.5s ease-out';
          conf.style.transform = `rotate(${Math.random()*360}deg)`;
          document.body.appendChild(conf);
          setTimeout(() => {
            conf.style.top = '-50px';
            conf.style.opacity = '0';
            conf.style.transform = 'rotate(540deg) scale(0.2)';
          }, 50);
          setTimeout(() => conf.remove(), 1600);
        }
      });

      // ---- дополнительная магия: меняем содержимое карточек при двойном клике ----
      document.querySelectorAll('.card').forEach((card, index) => {
        card.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          const surprisePhrase = index === 0 ? '💐 Будьте счастливы каждый день! 💐' : '🌸 Море цветов и тепла! 🌸';
          let msg = this.querySelector('.hidden-message');
          if (msg) msg.innerText = surprisePhrase;
          else {
            msg = document.createElement('div');
            msg.className = 'hidden-message';
            msg.innerText = surprisePhrase;
            this.appendChild(msg);
          }
          // небольшое свечение
          this.style.boxShadow = '0 0 0 4px #ffbfd5';
          setTimeout(() => this.style.boxShadow = '', 400);
        });
      });

      //  плавная инициализация параллакса: зададим каждому data-depth если нет
      parallaxItems.forEach(item => {
        if (!item.getAttribute('data-depth')) {
          item.setAttribute('data-depth', (Math.random() * 0.6 + 0.2).toFixed(2));
        }
      });

      // крошечная коррекция: фон не должен перекрывать клики
      // уже pointer-events: none.
    })();
  </script>

  <!-- маленький дополнительный блок стилей для скрытых сообщений, без наложений -->
  <style>
    /* гарантируем, что всё красиво на мобильных */
    .hidden-message {
      transition: 0.2s;
      font-weight: 500;
    }
    .card .hidden-message {
      background: #ffe3ed;
      color: #a13058;
    }
    /* призрачный фон курсора не мешает нажатиям */
    .cursor-glow {
      transition: width 0.15s, height 0.15s, background 0.2s;
    }
    /* для кнопки: курсор кастомный и на ней */
    button, .card {
      cursor: none;
    }
  </style>
</body>
</html>
